<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Don PCs</title>
  <meta name="description" content="Custom PC builds, upgrades, and setup help.">
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f1218;
      color: #f5f7fb;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(48, 180, 130, 0.22), transparent 32rem),
        #0f1218;
    }

    main {
      width: min(680px, 100%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      max-width: 54ch;
      color: #c7d0de;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .tagline {
      color: #58d497;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.85rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      color: #0f1218;
      background: #58d497;
      border-radius: 6px;
      padding: 12px 16px;
      text-decoration: none;
      font-weight: 700;
    }

    a.secondary {
      color: #f5f7fb;
      background: #232a35;
    }
  </style>
</head>
<body>
  <main>
    <div class="tagline">Custom PC Builds</div>
    <h1>Don PCs</h1>
    <p>
      Custom gaming PCs, upgrades, and setup help. Built for clean performance,
      reliable parts, and a setup that matches how you actually play or work.
    </p>
    <div class="links">
      <a href="https://discord.com/" target="_blank" rel="noopener">Contact on Discord</a>
      <a class="secondary" href="mailto:your-email@example.com">Email</a>
    </div>
  </main>
</body>
</html>
