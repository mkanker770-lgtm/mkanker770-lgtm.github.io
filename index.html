<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frameshift PCs | Premium Custom Gaming PCs</title>
  <meta name="description" content="Premium custom gaming PCs and workstations professionally assembled, tested, and supported by Frameshift PCs.">
  <script>
    (function(w,d,s,r,n){w.TrustpilotObject=n;w[n]=w[n]||function(){(w[n].q=w[n].q||[]).push(arguments)};
      a=d.createElement(s);a.async=1;a.src=r;a.type='text/java'+s;f=d.getElementsByTagName(s)[0];
      f.parentNode.insertBefore(a,f)})(window,document,'script', 'https://invitejs.trustpilot.com/tp.min.js', 'tp');
    tp('register', 'JHJK3xlip3jKmJl7');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#f8fbff",
            line: "rgba(255,255,255,0.12)",
            electric: "#38c8ff",
            violet: "#9f67ff",
            trust: "#00b67a"
          },
          boxShadow: {
            glow: "0 22px 70px rgba(56,200,255,0.18)",
            premium: "0 30px 120px rgba(0,0,0,0.46)"
          }
        }
      }
    };
  </script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    body {
      background:
        radial-gradient(circle at 16% 4%, rgba(56,200,255,.22), transparent 32rem),
        radial-gradient(circle at 86% 8%, rgba(159,103,255,.28), transparent 34rem),
        linear-gradient(180deg, #070911 0%, #05060a 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.034) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.034) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.75), transparent 76%);
    }
    .glass {
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.095), rgba(255,255,255,.045));
      backdrop-filter: blur(22px);
    }
    .view-enter {
      animation: viewEnter .34s ease both;
    }
    @keyframes viewEnter {
      from { opacity: 0; transform: translateY(14px) scale(.992); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .floaty {
      transform: perspective(1100px) rotateY(-7deg) rotateX(3deg);
      animation: floaty 6s ease-in-out infinite;
    }
    @keyframes floaty {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -10px; }
    }
  </style>
</head>
<body class="text-ink antialiased">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useMemo, useState } = React;
    const discordUrl = "https://discord.gg/PqZz6Qrdr";
    const trustpilotUrl = "https://www.trustpilot.com/review/mkanker770-lgtm.github.io";

    const navItems = ["Home", "Gaming PCs", "Workstations", "Reviews", "FAQ", "Order"];

    const builds = [
      { name: "Shift 4060", image: "build-4060.jpg", tag: "1080p", price: "$799+", specs: ["RTX 4060", "Ryzen 5 7600", "16GB DDR5", "1TB NVMe"] },
      { name: "Pulse 5060 Ti", image: "build-5060ti.jpg", tag: "1440p", price: "$1,099+", specs: ["RTX 5060 Ti", "Ryzen 5 9600X", "32GB DDR5", "240mm AIO"] },
      { name: "Surge 5070", image: "build-5070.jpg", tag: "High FPS", price: "$1,499+", specs: ["RTX 5070", "Ryzen 7 9700X", "32GB DDR5", "2TB NVMe"] },
      { name: "Apex 4080", image: "build-4080.jpg", tag: "4K", price: "$2,299+", specs: ["RTX 4080", "Ryzen 7 9800X3D", "64GB DDR5", "360mm AIO"] }
    ];

    const payments = [["P", "PayPal"], ["CC", "Credit/Debit"], ["A", "Apple Pay"], ["G", "Google Pay"], ["K", "Klarna"]];
    const indicators = [["5★ Reviews", "Public proof"], ["Secure Payments", "Flexible checkout"], ["Warranty", "Support included"]];

    function Button({ children, href, onClick, variant = "primary" }) {
      const classes = variant === "primary"
        ? "bg-gradient-to-br from-white via-electric to-violet text-slate-950 shadow-glow"
        : "border border-line bg-white/10 text-white hover:bg-white/15";
      return href ? (
        <a href={href} onClick={onClick} className={`inline-flex min-h-12 items-center justify-center rounded-xl px-5 text-sm font-black transition hover:-translate-y-0.5 ${classes}`}>{children}</a>
      ) : (
        <button onClick={onClick} className={`inline-flex min-h-12 items-center justify-center rounded-xl px-5 text-sm font-black transition hover:-translate-y-0.5 ${classes}`}>{children}</button>
      );
    }

    function PageShell({ eyebrow, title, children, aside }) {
      return (
        <section className="view-enter grid h-full min-h-0 gap-5 overflow-y-auto pr-1 lg:grid-cols-[minmax(0,1fr)_390px]">
          <div className="min-h-0 overflow-hidden rounded-2xl">
            <div className="mb-4 text-xs font-black uppercase tracking-[0.16em] text-cyan-200">{eyebrow}</div>
            <h1 className="max-w-5xl text-4xl font-black leading-[.92] tracking-normal md:text-6xl xl:text-7xl">{title}</h1>
            <div className="mt-6">{children}</div>
          </div>
          {aside}
        </section>
      );
    }

    function BuildCard({ build }) {
      return (
        <article className="glass group overflow-hidden rounded-2xl shadow-premium">
          <div className="aspect-[16/10] overflow-hidden bg-slate-950">
            <img src={build.image} alt={`${build.name} custom PC`} className="h-full w-full object-cover transition duration-500 group-hover:scale-105" />
          </div>
          <div className="p-4">
            <div className="flex items-start justify-between gap-3">
              <div>
                <h3 className="text-lg font-black">{build.name}</h3>
                <p className="mt-1 text-sm text-slate-400">{build.tag} performance tier</p>
              </div>
              <div className="text-xl font-black">{build.price}</div>
            </div>
            <div className="mt-4 grid gap-2 text-sm text-slate-300">
              {build.specs.map((spec) => <div className="flex justify-between border-b border-white/10 pb-2" key={spec}><span>Spec</span><b className="text-white">{spec}</b></div>)}
            </div>
          </div>
        </article>
      );
    }

    function Home({ setActive }) {
      return (
        <div className="view-enter grid h-full min-h-0 items-center gap-8 overflow-y-auto pr-1 lg:grid-cols-[.95fr_1.05fr]">
          <div>
            <div className="mb-5 inline-flex rounded-full border border-violet/40 bg-violet/15 px-4 py-2 text-xs font-black uppercase tracking-[0.16em] text-violet-100">Premium custom systems</div>
            <h1 className="max-w-4xl text-5xl font-black leading-[.86] tracking-normal md:text-7xl xl:text-8xl">Custom Gaming PCs Built For You</h1>
            <p className="mt-7 max-w-2xl text-lg leading-8 text-slate-300">Professionally assembled, stress-tested, tuned, and supported. Frameshift PCs builds premium systems that arrive clean, stable, and ready for gaming or creative work.</p>
            <div className="mt-8 flex flex-wrap gap-3">
              <Button onClick={() => setActive("Order")}>Get a Quote</Button>
              <Button href={discordUrl} variant="secondary">Join Discord</Button>
            </div>
            <div className="mt-8 grid gap-3 sm:grid-cols-3">
              {indicators.map(([title, copy]) => <div className="glass rounded-2xl p-4" key={title}><b>{title}</b><span className="mt-1 block text-sm text-slate-400">{copy}</span></div>)}
            </div>
            <div className="mt-5 flex flex-wrap gap-2">
              {payments.map(([mark, label]) => <span className="inline-flex min-h-10 items-center gap-2 rounded-full border border-white/10 bg-white/10 px-3 text-sm font-bold text-slate-200" key={label}><span className="grid h-6 w-6 place-items-center rounded-full bg-gradient-to-br from-electric to-violet text-xs font-black text-slate-950">{mark}</span>{label}</span>)}
            </div>
          </div>
          <div className="relative hidden min-h-[520px] lg:block">
            <div className="absolute inset-8 rounded-full bg-violet/20 blur-3xl"></div>
            <div className="floaty glass relative mx-auto max-w-[660px] overflow-hidden rounded-2xl shadow-premium">
              <img className="aspect-[4/3] w-full object-cover" src="build-5070.jpg" alt="Premium custom gaming PC" />
              <div className="absolute inset-x-4 bottom-4 flex items-center justify-between gap-4 rounded-2xl border border-white/15 bg-slate-950/75 p-4 backdrop-blur-2xl">
                <div><b className="block">Surge 5070</b><span className="text-sm text-slate-400">High-FPS 1440p platform</span></div>
                <div className="text-2xl font-black">$1,499+</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GamingPCs({ setActive }) {
      return (
        <PageShell
          eyebrow="Gaming PCs"
          title="Featured builds in clean performance tiers."
          aside={<aside className="glass hidden rounded-2xl p-6 lg:block"><h3 className="text-2xl font-black">Configure, then quote.</h3><p className="mt-4 leading-7 text-slate-300">Start from one of these systems, then adjust the look, budget, storage, cooling, and deadline before final pricing.</p><div className="mt-6"><Button onClick={() => setActive("Order")}>Get a Quote</Button></div></aside>}
        >
          <div className="grid max-h-[calc(100vh-250px)] gap-4 overflow-hidden md:grid-cols-2 xl:grid-cols-4">
            {builds.map((build) => <BuildCard build={build} key={build.name} />)}
          </div>
        </PageShell>
      );
    }

    function Workstations({ setActive }) {
      const cards = [
        ["Creator Ready", "High-memory options, fast storage, and quiet cooling for editing, streaming, design, and school work."],
        ["Clean Assembly", "Professional cable routing, airflow-aware part choices, and a premium finished look."],
        ["Tested Stability", "Thermals and stability are checked before delivery so the system is ready day one."]
      ];
      return (
        <PageShell
          eyebrow="Workstations"
          title="Performance systems for more than gaming."
          aside={<aside className="glass rounded-2xl bg-[url('build-4080.jpg')] bg-cover bg-center p-6 shadow-premium"><div className="rounded-2xl border border-white/15 bg-slate-950/70 p-5 backdrop-blur-xl"><h3 className="text-2xl font-black">Apex 4080</h3><p className="mt-3 text-slate-300">4K gaming, creator work, and heavy multitasking from $2,299+.</p></div></aside>}
        >
          <div className="grid gap-4 md:grid-cols-3">
            {cards.map(([title, copy], index) => <article className="glass rounded-2xl p-6" key={title}><div className="mb-5 grid h-12 w-12 place-items-center rounded-xl bg-gradient-to-br from-electric to-violet font-black text-slate-950">0{index + 1}</div><h3 className="text-xl font-black">{title}</h3><p className="mt-3 leading-7 text-slate-300">{copy}</p></article>)}
          </div>
        </PageShell>
      );
    }

    function Reviews() {
      return (
        <PageShell
          eyebrow="Reviews"
          title="Trust signals that feel public and verifiable."
          aside={<aside className="glass flex flex-col justify-between rounded-2xl p-6"><div><div className="text-2xl font-black text-trust">Trustpilot</div><h3 className="mt-4 text-3xl font-black">Already bought from us?</h3><p className="mt-4 leading-7 text-slate-300">Leave feedback after delivery so buyers can verify the Frameshift experience.</p></div><div className="mt-7 flex flex-wrap gap-3"><Button href={trustpilotUrl}>Write Review</Button><Button href={discordUrl} variant="secondary">Community</Button></div></aside>}
        >
          <article className="glass max-w-3xl rounded-2xl p-7 shadow-premium">
            <b>Don</b>
            <div className="my-4 flex gap-1" aria-label="5 out of 5 rating">{Array.from({ length: 5 }).map((_, index) => <span className="grid h-8 w-8 place-items-center rounded bg-trust font-black" key={index}>*</span>)}</div>
            <h3 className="text-2xl font-black">Fast and Reliable!</h3>
            <p className="mt-4 text-lg leading-8 text-slate-200">Ordered a custom PC through Frameshift on Discord and it arrived super fast. Build was perfect and ready to go right out of the box. Highly recommend for anyone wanting a quick, smooth experience.</p>
            <div className="mt-5 flex flex-wrap gap-2 text-sm text-slate-300"><span className="rounded-full bg-white/10 px-3 py-2">June 4, 2026</span><span className="rounded-full bg-white/10 px-3 py-2">Trustpilot review</span></div>
          </article>
        </PageShell>
      );
    }

    function FAQ() {
      const faqs = [
        ["Are prices final?", "Listed prices are starting points. Your quote confirms the exact total based on parts, shipping, and options."],
        ["Can I choose the look?", "Yes. Black, white, RGB, stealth, premium glass, creator, and budget-focused themes can all be discussed."],
        ["How does Discord fit?", "Discord is the community and quote channel. The site stays professional while Discord handles live communication."]
      ];
      return (
        <PageShell eyebrow="FAQ" title="Quick answers before you order.">
          <div className="grid gap-4 md:grid-cols-3">
            {faqs.map(([q, a]) => <article className="glass rounded-2xl p-6" key={q}><h3 className="text-xl font-black">{q}</h3><p className="mt-3 leading-7 text-slate-300">{a}</p></article>)}
          </div>
        </PageShell>
      );
    }

    function Order() {
      return (
        <PageShell
          eyebrow="Order"
          title="Get a custom quote without guessing parts."
          aside={<aside className="glass rounded-2xl p-6"><h3 className="text-2xl font-black">Quote template</h3><p className="mt-4 font-mono text-sm leading-7 text-slate-300">Budget: $____<br />Main games: ____<br />Resolution: 1080p / 1440p / 4K<br />Theme: ____<br />Wi-Fi needed: yes / no<br />Deadline: ____</p></aside>}
        >
          <p className="max-w-3xl text-lg leading-8 text-slate-300">Send your budget, games, resolution, theme, Wi-Fi needs, and deadline. We will help you choose the right tier and confirm a final parts list.</p>
          <div className="mt-8 flex flex-wrap gap-3"><Button href={discordUrl}>Join Discord</Button><Button href={trustpilotUrl} variant="secondary">Review Us</Button></div>
          <div className="mt-8 grid gap-3 sm:grid-cols-3">{indicators.map(([title, copy]) => <div className="glass rounded-2xl p-4" key={title}><b>{title}</b><span className="mt-1 block text-sm text-slate-400">{copy}</span></div>)}</div>
        </PageShell>
      );
    }

    function App() {
      const initial = useMemo(() => {
        const hash = decodeURIComponent(location.hash.slice(1)).replace(/-/g, " ");
        return navItems.find((item) => item.toLowerCase() === hash.toLowerCase()) || "Home";
      }, []);
      const [active, setActiveState] = useState(initial);

      function setActive(item) {
        setActiveState(item);
        history.replaceState(null, "", `#${item.toLowerCase().replace(/\s+/g, "-")}`);
      }

      const page = {
        Home: <Home setActive={setActive} />,
        "Gaming PCs": <GamingPCs setActive={setActive} />,
        Workstations: <Workstations setActive={setActive} />,
        Reviews: <Reviews />,
        FAQ: <FAQ />,
        Order: <Order />
      }[active];

      return (
        <div className="flex h-screen flex-col overflow-hidden">
          <header className="shrink-0 border-b border-white/10 bg-slate-950/70 backdrop-blur-2xl">
            <nav className="mx-auto flex min-h-20 w-[min(1240px,calc(100%-32px))] flex-col gap-3 py-3 lg:flex-row lg:items-center lg:justify-between">
              <button onClick={() => setActive("Home")} className="flex items-center gap-3 text-left font-black">
                <img className="h-11 w-11 object-contain drop-shadow-[0_0_18px_rgba(159,103,255,.8)]" src="frameshift-logo.png" alt="Frameshift PCs logo" />
                <span>Frameshift PCs</span>
              </button>
              <div className="flex flex-wrap items-center gap-1 rounded-2xl border border-white/10 bg-white/5 p-1 text-sm font-bold text-slate-300" role="tablist" aria-label="Site pages">
                {navItems.map((item) => (
                  <button
                    className={`rounded-xl px-3 py-2 transition ${active === item ? "bg-white text-slate-950" : "hover:bg-white/10 hover:text-white"}`}
                    onClick={() => setActive(item)}
                    role="tab"
                    aria-selected={active === item}
                    key={item}
                  >
                    {item}
                  </button>
                ))}
              </div>
              <div className="flex flex-wrap gap-2">
                <Button onClick={() => setActive("Order")}>Get a Quote</Button>
                <Button href={discordUrl} variant="secondary">Join Discord</Button>
              </div>
            </nav>
          </header>
          <main className="min-h-0 flex-1 overflow-hidden">
            <div className="mx-auto h-full w-[min(1240px,calc(100%-32px))] py-5 md:py-7">
              {page}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
